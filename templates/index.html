<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>SWMM Platform - Hydraulic Expert</title>
    <!-- FontAwesome pour les icones de l'éditeur -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            margin: 0;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        #sidebar {
            width: 280px;
            background: #16213e;
            padding: 16px;
        }

        #map {
            flex: 1;
        }
        
        .cluster-button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .cluster-button:hover {
            background: #219a52;
        }
        
        .cluster-button:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }
        
        #cluster-status {
            margin-top: 10px;
            font-size: 0.9em;
            background: #0f3460;
            padding: 8px;
            border-radius: 4px;
        }

        /* Barre d'outils d'édition hydraulique */
        .edit-toolbar {
            position: fixed; /* Changé de absolute à fixed car en dehors du map */
            top: 20px;
            right: 20px;
            z-index: 2000;
            background: rgba(22, 33, 62, 0.95);
            backdrop-filter: blur(5px);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            background: #0f3460;
            border: none;
            border-radius: 6px;
            color: #eee;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.2em;
        }

        .tool-btn:hover {
            background: #e94560;
            transform: scale(1.05);
        }

        .tool-btn.active {
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .tool-tip {
            position: relative;
        }

        .tool-tip:hover::after {
            content: attr(data-tip);
            position: absolute;
            left: 50px;
            top: 50%;
            transform: translateY(-50%);
            background: #1a1a2e;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 1001;
            border: 1px solid #e94560;
        }
#bassin-section {
            display: none;
            margin-top: 16px;
        }

        #bassin-section label {
            font-size: 13px;
            font-weight: 600;
            color: #aab;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 6px;
        }

        #bassin-select {
            width: 100%;
            padding: 8px 10px;
            background: #0f3460;
            color: #eee;
            border: 1px solid #2980b9;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        #bassin-select:hover, #bassin-select:focus {
            border-color: #3498db;
        }

        #bassin-select option {
            background: #16213e;
        }

        #bassin-info {
            margin-top: 8px;
            font-size: 12px;
            color: #95a5a6;
            line-height: 1.5;
        }
        
        /* Overlay de chargement */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 24px;
            color: #fff;
        }
        
        .loading-content {
            text-align: center;
            background: rgba(30, 33, 62, 0.9);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
    <!-- Overlay de chargement -->
    <div id="loading-overlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div>Chargement des données...</div>
        </div>
    </div>
    
    <div id="sidebar">
        <h2>SWMM Platform</h2>
        <div id="stat-total" style="display:none;">--</div>
        <div id="mini-stats">Chargement...</div>
        <div>
            <input type="checkbox" id="f-conduites" checked><label for="f-conduites">Conduites</label><br>
            <input type="checkbox" id="f-regards"><label for="f-regards">Regards</label><br>
            <input type="checkbox" id="f-stations" checked><label for="f-stations">Stations</label><br>
            <input type="checkbox" id="f-step" checked><label for="f-step">STEP</label><br>
            <input type="checkbox" id="f-ouvrages" checked><label for="f-ouvrages">Ouvrages</label><br>
            <hr style="border: 0.5px solid #eee; margin: 10px 0;">
            <input type="checkbox" id="f-bassins" disabled><label id="label-bassins" for="f-bassins" style="color: #999;"><b>Bassins Versants</b></label>
        </div>
        <button class="cluster-button" id="detect-cluster-btn">Détecter les bassins urbains</button>
        <div id="cluster-status"></div>

        <!-- Liste déroulante des bassins (visible après détection) -->
        <div id="bassin-section">
            <label for="bassin-select">🗺 Sélectionner un bassin</label>
            <select id="bassin-select"></select>
            <div id="bassin-info"></div>
        </div>
    </div>
    <!-- Barre d'outils d'édition (déplacée hors de map) -->
    <div class="edit-toolbar" id="main-edit-toolbar">
        <button class="tool-btn tool-tip" id="btn-create-bassin" data-tip="Nouveau Bassin (Polygone)">
            <i class="fas fa-draw-polygon"></i>
        </button>
        <button class="tool-btn tool-tip" id="btn-merge-bassin" data-tip="Fusionner Bassins" disabled>
            <i class="fas fa-link"></i>
        </button>
        <button class="tool-btn tool-tip" id="btn-delete-bassin" data-tip="Supprimer" disabled>
            <i class="fas fa-trash-alt"></i>
        </button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 4px 0;">
        <button class="tool-btn tool-tip" id="btn-save-edit" data-tip="Enregistrer les modifications" disabled>
            <i class="fas fa-save"></i>
        </button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let carte = L.map('map').setView([36.15, 1.33], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(carte);

        let couches = {
            conduites: L.layerGroup().addTo(carte),
            regards: L.layerGroup(), // Pas de .addTo(carte) par défaut
            stations: L.layerGroup().addTo(carte),
            step: L.layerGroup().addTo(carte),
            ouvrages: L.layerGroup().addTo(carte),
            bassins: L.layerGroup() // Pas de .addTo(carte) par défaut
        };

        // Couche pour les clusters détectés
        let clusterCouche = L.layerGroup().addTo(carte);
        
        // Référence globale vers le layer Leaflet des clusters (pour synchro dropdown)
        let _activeClusterLayer = null;
        // Map clusterId -> bounds du bassin
        let _bassinBounds = {};

        ['conduites', 'regards', 'stations', 'step', 'ouvrages', 'bassins'].forEach(type => {
            document.getElementById('f-' + type).onchange = (e) => {
                if (e.target.checked) couches[type].addTo(carte);
                else carte.removeLayer(couches[type]);
            };
        });

        // Fonction pour afficher/masquer l'overlay de chargement
        function montrerChargement(afficher) {
            const overlay = document.getElementById('loading-overlay');
            if (afficher) {
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }

        // Variables pour l'éditeur manuel
        let editorState = {
            active: false,
            mode: null,
            points: [],
            markers: [],
            tempPolyline: null,
            tempPolygon: null,
            selectedConduits: new Set(),
            foundOutfall: null
        };

        // Activer/Désactiver le mode édition
        document.getElementById('btn-create-bassin').onclick = function() {
            if (editorState.active && editorState.mode === 'create') {
                desactiverModeEdition();
            } else {
                activerModeEdition('create');
            }
        };

        // Plus besoin de disableClickPropagation car toolbar est hors de map

        function activerModeEdition(mode) {
            editorState.active = true;
            editorState.mode = mode;
            editorState.selectedConduits.clear();
            editorState.points = [];
            
            const btn = document.getElementById('btn-create-bassin');
            btn.classList.add('active');
            btn.innerHTML = '<i class="fas fa-times"></i>'; // Changer en "Annuler"
            btn.setAttribute('data-tip', 'Annuler la création');

            carte.dragging.disable(); 
            carte.getContainer().style.cursor = 'crosshair';
            document.getElementById('cluster-status').innerHTML = "<b>Mode Édition</b><br>Tracez votre polygone point par point...";
        }

        function desactiverModeEdition() {
            editorState.active = false;
            editorState.mode = null;
            
            const btn = document.getElementById('btn-create-bassin');
            btn.classList.remove('active');
            btn.innerHTML = '<i class="fas fa-draw-polygon"></i>';
            btn.setAttribute('data-tip', 'Nouveau Bassin (Polygone)');

            if (editorState.tempPolyline) carte.removeLayer(editorState.tempPolyline);
            if (editorState.tempPolygon) carte.removeLayer(editorState.tempPolygon);
            editorState.markers.forEach(m => carte.removeLayer(m));
            
            editorState.points = [];
            editorState.markers = [];
            editorState.tempPolyline = null;
            editorState.tempPolygon = null;

            carte.dragging.enable();
            carte.getContainer().style.cursor = '';
            document.getElementById('btn-save-edit').disabled = true;
            nettoyerSurlignageSelection();
        }

        function nettoyerSurlignageSelection() {
            // Rétablir le style original des tronçons
            if (_activeClusterLayer) {
                highlightCluster(document.getElementById('bassin-select').value || null, _activeClusterLayer);
            } else if (couches.conduites) {
                couches.conduites.setStyle({ color: '#3498db', weight: 3, opacity: 1 });
            }
        }

        // Événements souris pour le tracé du polygone
        carte.on('click', (e) => {
            if (!editorState.active || editorState.mode !== 'create') return;
            
            const latlng = e.latlng;
            console.log("[Editor] Clic à:", latlng);
            
            // Si on clique sur le premier point (ou proche), on ferme le polygone
            if (editorState.points.length >= 2) {
                const firstPoint = editorState.points[0];
                const dist = carte.latLngToContainerPoint(latlng).distanceTo(carte.latLngToContainerPoint(firstPoint));
                console.log("[Editor] Distance au départ:", dist.toFixed(1), "px");
                
                if (dist < 25) { // Seuil augmenté à 25px pour plus de souplesse
                    console.log("[Editor] Fermeture par proximité");
                    finaliserPolygone();
                    return;
                }
            }

            ajouterPointPolygone(latlng);
        });

        // Fermeture par CLIC DROIT (Standard SIG)
        carte.on('contextmenu', (e) => {
            if (editorState.active && editorState.mode === 'create') {
                L.DomEvent.preventDefault(e); // Empêcher le menu du navigateur
                if (editorState.points.length > 2) {
                    console.log("[Editor] Fermeture par clic droit");
                    finaliserPolygone();
                } else {
                    alert("Tracez au moins 3 points avant de terminer.");
                }
            }
        });

        function ajouterPointPolygone(latlng) {
            editorState.points.push(latlng);
            
            // Ajouter un marqueur visuel
            const marker = L.circleMarker(latlng, {
                radius: 6, color: '#e94560', fillColor: '#fff', fillOpacity: 1, weight: 2,
                pane: 'markerPane', interactive: true
            }).addTo(carte);
            editorState.markers.push(marker);

            if (editorState.points.length === 1) {
                marker.setStyle({ radius: 10, color: '#f1c40f', weight: 4 });
                marker.bindTooltip("CLIQUEZ ICI pour fermer", { permanent: true, direction: 'top', className: 'close-tooltip' });
                
                marker.on('click', (ev) => {
                    console.log("[Editor] Clic direct sur marqueur départ");
                    L.DomEvent.stopPropagation(ev);
                    if (editorState.points.length > 2) finaliserPolygone();
                });
            }

            if (editorState.tempPolyline) carte.removeLayer(editorState.tempPolyline);
            editorState.tempPolyline = L.polyline(editorState.points, { color: '#e94560', weight: 3, dashArray: '5, 5' }).addTo(carte);
        }

        function finaliserPolygone() {
            console.log("[Editor] Finalisation du polygone avec", editorState.points.length, "points");
            if (editorState.tempPolyline) carte.removeLayer(editorState.tempPolyline);
            
            // Créer le polygone final
            editorState.tempPolygon = L.polygon(editorState.points, {
                color: "#e94560", weight: 2, fillOpacity: 0.15, dashArray: null
            }).addTo(carte);

            // Nettoyer les marqueurs de construction
            editorState.markers.forEach(m => carte.removeLayer(m));
            editorState.markers = [];

            const pts = [...editorState.points];
            editorState.points = []; // On vide pour bloquer le tracé
            
            // Lancer la détection
            capturerTronconsDansZone(pts);
        }

        // Algorithme Point-in-Polygon (Ray Casting) optimisé
        function isPointInPolygon(point, vs) {
            var x = point.lat, y = point.lng;
            var inside = false;
            for (var i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                var xi = vs[i].lat, yi = vs[i].lng;
                var xj = vs[j].lat, yj = vs[j].lng;
                var intersect = ((yi > y) != (yj > y))
                    && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function capturerTronconsDansZone(polyPoints) {
            console.log("[Editor] Analyse de la zone...");
            let count = 0;
            let exutoiresTrouves = [];
            editorState.selectedConduits.clear();
            
            // 1. Capturer les tronçons
            // On cherche dans la couche de clusters active ET dans la couche réseau brute
            const targets = [];
            if (_activeClusterLayer) targets.push(_activeClusterLayer);
            if (couches.conduites) targets.push(couches.conduites);

            targets.forEach(parentLayer => {
                parentLayer.eachLayer(layer => {
                    if (layer.feature && layer.feature.geometry.type === 'LineString') {
                        const coords = layer.getLatLngs();
                        // Un tronçon est capturé si l'un de ses points est dedans
                        const isInside = coords.some(pt => isPointInPolygon(pt, polyPoints));
                        if (isInside) {
                            const props = layer.feature.properties;
                            const id = props.conduit_id || props.fid || props.ID;
                            if (id && !editorState.selectedConduits.has(id)) {
                                editorState.selectedConduits.add(id);
                                layer.setStyle({ color: '#f1c40f', weight: 8, opacity: 1 });
                                count++;
                            }
                        }
                    }
                });
            });

            // 2. Chercher les exutoires
            ['stations', 'step', 'ouvrages'].forEach(type => {
                if (couches[type]) {
                    couches[type].eachLayer(layer => {
                        if (isPointInPolygon(layer.getLatLng(), polyPoints)) {
                            exutoiresTrouves.push({
                                id: layer.feature.properties.fid || layer.feature.properties.ID,
                                nom: layer.feature.properties.nom || layer.feature.properties.NOM || type,
                                type: type,
                                latlng: layer.getLatLng()
                            });
                        }
                    });
                }
            });

            console.log("[Editor] Résultat capture:", count, "tronçons,", exutoiresTrouves.length, "exutoires");
            gererResultatCapture(count, exutoiresTrouves);
        }

        function gererResultatCapture(count, exutoires) {
            const statusDiv = document.getElementById('cluster-status');
            if (count === 0) {
                statusDiv.innerHTML = "⚠️ Aucun tronçon capturé.<br>Cliquez sur le <b>X</b> pour recommencer.";
                return;
            }

            let msg = `<b>${count}</b> tronçons sélectionnés.<br>`;
            
            if (exutoires.length === 1) {
                msg += `✅ Exutoire : <b>${exutoires[0].nom}</b><br><br>👉 Cliquez sur 💾 pour enregistrer.`;
                editorState.foundOutfall = exutoires[0];
                document.getElementById('btn-save-edit').disabled = false;
            } else if (exutoires.length > 1) {
                msg += `❓ Plusieurs exutoires trouvés. Cliquez sur le bon :<br>`;
                exutoires.forEach((ex, idx) => {
                    msg += `<button class="cluster-button" style="margin-top:5px;" onclick="choisirExutoireManuel(${idx})">${ex.nom}</button>`;
                });
                editorState.tempExutoires = exutoires;
            } else {
                msg += `⚠️ Aucun exutoire détecté.<br><b>Désignez le point de sortie sur la carte...</b>`;
                activerPickExutoire(); // Passage automatique en mode cible
            }

            statusDiv.innerHTML = msg;
        }

        // Choix parmi une liste (si plusieurs détectés)
        window.choisirExutoireManuel = function(idx) {
            const ex = editorState.tempExutoires[idx];
            editorState.foundOutfall = ex;
            const statusDiv = document.getElementById('cluster-status');
            statusDiv.innerHTML = `<b>${editorState.selectedConduits.size}</b> tronçons sélectionnés.<br>✅ Exutoire : <b>${ex.nom}</b><br><br>👉 Cliquez sur 💾 pour enregistrer.`;
            document.getElementById('btn-save-edit').disabled = false;
        };

        // Mode "Pick" : l'utilisateur clique sur la carte pour désigner le rejet
        window.activerPickExutoire = function() {
            editorState.mode = 'pick_exutoire';
            carte.getContainer().style.cursor = 'crosshair';
            
            carte.once('click', (e) => {
                editorState.foundOutfall = {
                    id: 'custom_' + Date.now(),
                    nom: "Point désigné",
                    type: "manuel",
                    latlng: e.latlng
                };
                document.getElementById('cluster-status').innerHTML = `<b>${editorState.selectedConduits.size}</b> tronçons sélectionnés.<br>🎯 Exutoire fixé.<br><br>👉 Cliquez sur 💾 pour enregistrer.`;
                editorState.mode = 'create';
                carte.getContainer().style.cursor = '';
                document.getElementById('btn-save-edit').disabled = false;
            });
        };

        // Sauvegarder le bassin manuel
        document.getElementById('btn-save-edit').onclick = function() {
            if (editorState.selectedConduits.size === 0) return;
            
            const data = {
                conduits: Array.from(editorState.selectedConduits),
                exutoire: editorState.foundOutfall || null,
                nom: prompt("Nom du bassin :", editorState.foundOutfall ? "Bassin " + editorState.foundOutfall.nom : "Bassin Manuel")
            };

            if (!data.nom) return;

            fetch('/api/v1/manual-basin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                alert("Bassin manuel enregistré avec succès !");
                desactiverModeEdition();
                // Recharger les données pour voir le nouveau bassin
                document.getElementById('detect-cluster-btn').click();
            })
            .catch(err => {
                console.error(err);
                alert("Erreur lors de la sauvegarde.");
            });
        };

        // Supprimer un bassin manuel
        document.getElementById('btn-delete-bassin').onclick = function() {
            const sel = document.getElementById('bassin-select');
            const cid = sel.value;
            if (!cid || !cid.startsWith('M_')) {
                alert("Veuillez sélectionner un bassin manuel (marqué [MANUEL]) pour le supprimer.");
                return;
            }
            
            if (!confirm("Voulez-vous vraiment supprimer ce bassin manuel ?")) return;

            fetch(`/api/v1/manual-basin/${cid}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(res => {
                    alert("Bassin supprimé.");
                    // Recharger les clusters
                    document.getElementById('detect-cluster-btn').click();
                });
        };

        function chargerDonneesInitiales() {
            // Montrer l'overlay de chargement
            montrerChargement(true);
            
            fetch('/api/v1/layers')
                .then(r => r.json())
                .then(d => {
                    console.log('Données:', d.compteurs);
                    document.getElementById('stat-total').textContent = d.compteurs.conduites || 0;
                    document.getElementById('mini-stats').innerHTML =
                        'Conduites: ' + (d.compteurs.conduites || 0) +
                        ' | Regards: ' + (d.compteurs.regards || 0) +
                        ' | Stations: ' + (d.compteurs.stations || 0) +
                        ' | STEP: ' + (d.compteurs.step || 0) +
                        ' | Ouvrages: ' + (d.compteurs.ouvrages || 0);

                    // Conduites (lignes)
                    L.geoJSON(d.couches.conduites, {
                        style: { color: '#3498db', weight: 3 }
                    }).addTo(couches.conduites);

                    // Points (regards, stations, step, ouvrages)
                    const styles = {
                        regards: { radius: 4, color: '#f1c40f', fillColor: '#f1c40f' },
                        stations: { radius: 6, color: '#e67e22', fillColor: '#e67e22' },
                        step: { radius: 7, color: '#27ae60', fillColor: '#27ae60' },
                        ouvrages: { radius: 6, color: '#9b59b6', fillColor: '#9b59b6' }
                    };
                    ['regards', 'stations', 'step', 'ouvrages'].forEach(type => {
                        L.geoJSON(d.couches[type], {
                            pointToLayer: (feature, latlng) => L.circleMarker(latlng, styles[type])
                        }).addTo(couches[type]);
                    });

                    const bounds = L.latLngBounds([]);
                    Object.values(couches).forEach(l => l.getLayers().forEach(layer => {
                        bounds.extend(layer.getBounds ? layer.getBounds() : layer.getLatLng());
                    }));
                    if (bounds.isValid()) carte.fitBounds(bounds, { padding: [50, 50] });
                    
                    // Masquer l'overlay de chargement une fois les données chargées
                    montrerChargement(false);
                })
                .catch(e => {
                    console.error('Erreur:', e);
                    document.getElementById('mini-stats').textContent = 'Erreur chargement';
                    montrerChargement(false); // Masquer l'overlay même en cas d'erreur
                });
        }

        // Gestion du bouton de détection des clusters
        document.getElementById('detect-cluster-btn').addEventListener('click', function() {
            const btn = this;
            const statusDiv = document.getElementById('cluster-status');
            
            // Désactiver le bouton pendant le traitement
            btn.disabled = true;
            btn.textContent = 'Détection en cours...';
            statusDiv.textContent = 'Recherche des bassins hydrauliques...';
            
            // Effacer les anciens clusters
            clusterCouche.clearLayers();
            couches.bassins.clearLayers();
            
            // Appeler l'API de détection des clusters
            fetch('/api/v1/cluster')
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return response.json();
                })
                .then(clusterData => {
                    if (clusterData.features && clusterData.features.length > 0) {
                        const clusterLayer = L.geoJSON(clusterData, {
                            style: (feature) => {
                                const typeColors = {
                                    step:    { color: '#c0392b', fill: '#e74c3c' },
                                    station: { color: '#1a6fa0', fill: '#3498db' },
                                    ouvrage: { color: '#7d3c98', fill: '#9b59b6' },
                                    rejet:   { color: '#d35400', fill: '#e67e22' }
                                };
                                if (feature.properties.type === 'bassin_urbain') {
                                    const tc = typeColors[feature.properties.exutoire_type]
                                            || { color: '#27ae60', fill: '#2ecc71' };
                                    return {
                                        color:       tc.color,
                                        fillColor:   tc.fill,
                                        fillOpacity: 0.25,
                                        weight:      2,
                                        dashArray:   '6, 4'
                                    };
                                }
                                // Tronçons (LineString) : couleur issue de la classification
                                return {
                                    color:   feature.properties.couleur || '#3498db',
                                    weight:  2.5,
                                    opacity: 0.75
                                };
                            },
                            pointToLayer: (feature, latlng) => {
                                if (feature.properties.type === 'exutoire') {
                                    const typeColors = {
                                        step: '#e74c3c',
                                        station: '#3498db',
                                        ouvrage: '#9b59b6',
                                        rejet: '#e67e22'
                                    };
                                    const color = typeColors[feature.properties.exutoire_type] || '#27ae60';
                                    return L.circleMarker(latlng, {
                                        radius: 10,
                                        fillColor: color,
                                        color: '#fff',
                                        weight: 3,
                                        opacity: 1,
                                        fillOpacity: 1
                                    });
                                }
                                return L.marker(latlng);
                            },
                            onEachFeature: (feature, layer) => {
                                if (feature.properties.type === 'bassin_urbain') {
                                    const typLabels = { step: '🔴 STEP', station: '🔵 Station', ouvrage: '🟣 Ouvrage', rejet: '🟠 Rejet' };
                                    const typLabel = typLabels[feature.properties.exutoire_type] || '⚪ Exutoire';
                                    layer.bindTooltip(
                                        `<b>${feature.properties.nom || 'Bassin Urbain'}</b><br>${typLabel}`,
                                        { sticky: true }
                                    );

                                    layer.on('click', function(e) {
                                        L.DomEvent.stopPropagation(e);
                                        const cid = feature.properties.cluster_id;
                                        highlightCluster(cid, clusterLayer);
                                        // Sync dropdown
                                        const sel = document.getElementById('bassin-select');
                                        sel.value = String(cid);
                                        afficherInfoBassin(cid);
                                    });

                                    layer.on('mouseover', function() {
                                        this.setStyle({ fillOpacity: 0.5, weight: 3 });
                                    });
                                    layer.on('mouseout', function() {
                                        this.setStyle({ fillOpacity: 0.3, weight: 2 });
                                    });
                                } else if (feature.properties.type === 'exutoire') {
                                    const typLabels = { step: '🔴 STEP', station: '🔵 Station', ouvrage: '🟣 Ouvrage', rejet: '🟠 Rejet' };
                                    const typLabel = typLabels[feature.properties.exutoire_type] || '⚪ Exutoire';
                                    layer.bindTooltip(
                                        `<b>Exutoire: ${feature.properties.nom}</b><br>${typLabel}`,
                                        { sticky: true }
                                    );
                                } else if (feature.geometry.type === 'LineString') {
                                    const p = feature.properties;
                                    layer.bindTooltip(
                                        `<b>Conduite ${p.conduit_id || ''}</b><br>` +
                                        `📏 ${p.longueur ? p.longueur.toFixed(1) + ' m' : 'N/A'} &nbsp;|&nbsp; ` +
                                        `⌀ ${p.diametre || 'N/A'} mm<br>` +
                                        `Matériau: ${p.materiau || 'N/A'}<br>` +
                                        `Bassin n° ${p.cluster_id || '?'}`,
                                        { sticky: true }
                                    );
                                }
                            }
                        });

                        // Séparer les bassins des tronçons pour la gestion des couches
                        clusterLayer.eachLayer(layer => {
                            if (layer.feature.properties.type === 'bassin_urbain') {
                                layer.addTo(couches.bassins);
                            } else {
                                // Tronçons ET exutoires (points) restent sur la couche réseau
                                layer.addTo(clusterCouche);
                            }
                        });

                        _activeClusterLayer = clusterLayer;
                        
                        const nbBassins = clusterData.features.filter(f => f.properties.type === 'bassin_urbain').length;
                        const nbTroncons = clusterData.features.filter(f => f.geometry.type === 'LineString').length;
                        const nbOrphelins = clusterData.nb_orphelines || 0;
                        
                        statusDiv.innerHTML = `Détection terminée !<br><b>${nbBassins}</b> bassins identifiés<br><b>${nbTroncons}</b> tronçons connectés<br><span style="color: #e74c3c;"><b>${nbOrphelins}</b> tronçons orphelins</span>`;
                        
                        // Construire le menu déroulant des bassins
                        peuplerDropdownBassins(clusterData, clusterLayer);
                        
                        // S'assurer que rien n'est surligné au départ
                        highlightCluster(null, clusterLayer);
                        
                        // Activer la case à cocher des bassins (désactivée par défaut)
                        const chkBassins = document.getElementById('f-bassins');
                        const lblBassins = document.getElementById('label-bassins');
                        chkBassins.disabled = false;
                        lblBassins.style.color = 'inherit';
                        lblBassins.style.fontWeight = 'bold';

                        if (clusterLayer.getBounds().isValid()) {
                            carte.fitBounds(clusterLayer.getBounds(), { padding: [50, 50] });
                        }
                    } else {
                        statusDiv.textContent = 'Aucun cluster détecté';
                    }
                })
                .catch(error => {
                    console.error('Erreur:', error);
                    statusDiv.textContent = 'Erreur lors de la détection';
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = 'Détecter les bassins urbains';
                });
        });

        function highlightCluster(clusterId, geojsonLayer) {
            // Synchroniser le dropdown si l'appel vient du clic carte
            const sel = document.getElementById('bassin-select');
            if (clusterId !== null && sel.value !== String(clusterId)) {
                sel.value = String(clusterId);
                afficherInfoBassin(clusterId);
            }

            geojsonLayer.eachLayer(layer => {
                const feature = layer.feature;
                if (!feature) return;
                if (feature.geometry.type === 'LineString') {
                    if (clusterId === null || feature.properties.cluster_id === clusterId) {
                        layer.setStyle({ color: '#f1c40f', weight: 8, opacity: 1 });
                        layer.bringToFront();
                    } else {
                        layer.setStyle({ color: feature.properties.couleur || '#e74c3c', weight: 3, opacity: 0.4 });
                    }
                } else if (feature.properties && feature.properties.type === 'bassin_urbain') {
                    if (clusterId === null || feature.properties.cluster_id === clusterId) {
                        layer.setStyle({ fillOpacity: 0.45, weight: 3, color: '#f39c12' });
                    } else {
                        layer.setStyle({ fillOpacity: 0.15, weight: 1, color: '#27ae60' });
                    }
                }
            });
        }

        function peuplerDropdownBassins(geojsonData, clusterLayer) {
            const sel = document.getElementById('bassin-select');
            sel.innerHTML = '<option value="">-- Choisir un bassin --</option>';
            _bassinBounds = {};

            // Extraire les bassins (polygones) et construire leurs bounds
            const bassins = geojsonData.features.filter(f => f.properties.type === 'bassin_urbain');
            bassins.sort((a, b) => a.properties.cluster_id - b.properties.cluster_id);

            bassins.forEach(f => {
                const cid = f.properties.cluster_id;
                const nom = f.properties.nom || `Bassin ${cid}`;
                const opt = document.createElement('option');
                opt.value = cid;
                opt.textContent = nom;
                sel.appendChild(opt);
            });

            // Calculer les bounds de chaque bassin depuis le layer Leaflet
            clusterLayer.eachLayer(layer => {
                const feature = layer.feature;
                if (!feature || feature.properties.type !== 'bassin_urbain') return;
                const cid = feature.properties.cluster_id;
                try { _bassinBounds[cid] = layer.getBounds(); } catch(e) {}
            });

            // Afficher la section
            document.getElementById('bassin-section').style.display = 'block';

            // Écouteur du dropdown
            sel.addEventListener('change', function() {
                const cid = this.value;
                
                // Activer le bouton supprimer SI c'est un bassin manuel
                const btnDelete = document.getElementById('btn-delete-bassin');
                if (cid && String(cid).startsWith('M_')) {
                    btnDelete.disabled = false;
                    btnDelete.style.color = '#e74c3c';
                } else {
                    btnDelete.disabled = true;
                    btnDelete.style.color = '';
                }

                if (!cid) {
                    highlightCluster(null, clusterLayer);
                    afficherInfoBassin(null);
                    return;
                }
                
                // Si c'est manuel, c'est une chaîne, sinon un int
                const finalCid = cid.startsWith('M_') ? cid : parseInt(cid);
                highlightCluster(finalCid, clusterLayer);
                afficherInfoBassin(finalCid);
                if (_bassinBounds[cid]) {
                    carte.fitBounds(_bassinBounds[cid], { padding: [60, 60] });
                }
            });
        }

        function afficherInfoBassin(clusterId) {
            const infoDiv = document.getElementById('bassin-info');
            if (!_activeClusterLayer || clusterId === null) {
                infoDiv.innerHTML = ''; return;
            }
            let nb = 0;
            _activeClusterLayer.eachLayer(layer => {
                const f = layer.feature;
                if (f && f.geometry.type === 'LineString' && f.properties.cluster_id === clusterId) nb++;
            });
            infoDiv.innerHTML = `📍 ${nb} tronçon(s) dans ce bassin`;
        }

        // Chargement initial des données
        chargerDonneesInitiales();
    </script>
</body>

</html>
