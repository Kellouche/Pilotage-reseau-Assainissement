<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Simple - SWMM Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: Arial, sans-serif; }
        #map { height: 100%; width: 100%; }
        .controls { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border: 1px solid #ccc; }
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; margin-bottom: 5px; }
        .notification { position: fixed; top: 10px; right: 10px; background: #4caf50; color: white; padding: 10px; border-radius: 4px; z-index: 2000; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="controls">
        <div class="control-group">
            <h3>Filtres Anomalies</h3>
            <label><input type="checkbox" id="type-incoherences_amont_aval" onchange="updateAnomalies()"> Incohérences amont/aval</label>
            <label><input type="checkbox" id="type-conduites_sans_regards" onchange="updateAnomalies()"> Conduites sans regard</label>
        </div>
        <button onclick="zoomOnAnomalies()">Zoom sur anomalies</button>
    </div>
    <div id="notification" class="notification" style="display: none;"></div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5001';

        let map;
        let layers = {};
        let anomaliesData = {};
        let anomalyMarkers = [];

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            loadData();
        });

        function initMap() {
            map = L.map('map').setView([36.13, 1.32], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        async function loadData() {
            try {
                // Charger les couches
                const layersResp = await fetch(`${API_BASE_URL}/api/v1/layers`);
                const layersData = await layersResp.json();

                loadLayers(layersData.couches);

                // Charger les anomalies
                const anomaliesResp = await fetch(`${API_BASE_URL}/api/v1/qualite/analyse`);
                anomaliesData = await anomaliesResp.json();
                anomaliesData = anomaliesData.anomalies || {};

                updateAnomalies();
                showNotification('Données chargées', 'success');
            } catch (error) {
                console.error('Erreur chargement:', error);
                showNotification('Erreur chargement: ' + error.message, 'error');
            }
        }

        function loadLayers(couches) {
            // Conduites
            if (couches.conduites && couches.conduites.features) {
                layers.conduites = L.geoJSON(couches.conduites, {
                    style: { color: '#4caf50', weight: 3 }
                }).addTo(map);
            }

            // Regards
            if (couches.regards && couches.regards.features) {
                layers.regards = L.geoJSON(couches.regards, {
                    pointToLayer: (feature, latlng) => L.circleMarker(latlng, { color: '#2196f3', radius: 3 })
                }).addTo(map);
            }
        }

        function updateAnomalies() {
            // Supprimer les anciens marqueurs
            anomalyMarkers.forEach(marker => map.removeLayer(marker));
            anomalyMarkers = [];

            const showIncoherences = document.getElementById('type-incoherences_amont_aval').checked;
            const showConduitesSans = document.getElementById('type-conduites_sans_regards').checked;

            if (showIncoherences && anomaliesData.incoherences_amont_aval) {
                anomaliesData.incoherences_amont_aval.forEach(anomalie => {
                    const coords = getAnomalieCoords(anomalie);
                    if (coords) {
                        const marker = L.circleMarker(coords, { color: 'red', radius: 8 }).addTo(map);
                        marker.bindPopup(`Incohérence: ${anomalie.id_conduite1} - ${anomalie.id_conduite2}`);
                        anomalyMarkers.push(marker);
                    }
                });
            }

            if (showConduitesSans && anomaliesData.conduites_sans_regards) {
                anomaliesData.conduites_sans_regards.forEach(anomalie => {
                    const coords = getAnomalieCoords(anomalie);
                    if (coords) {
                        const marker = L.circleMarker(coords, { color: 'orange', radius: 8 }).addTo(map);
                        marker.bindPopup(`Conduite sans regard: ${anomalie.id_conduite}`);
                        anomalyMarkers.push(marker);
                    }
                });
            }
        }

        function getAnomalieCoords(anomalie) {
            // Utiliser les coordonnées du backend si disponibles
            if (anomalie.longitude !== undefined && anomalie.latitude !== undefined) {
                return [anomalie.latitude, anomalie.longitude];
            }

            // Fallback pour incoherences_amont_aval: centroïde de la conduite aval
            if (anomalie.type === 'incoherence_profondeur' && anomalie.id_conduite2 && layers.conduites) {
                let coords = null;
                layers.conduites.eachLayer(layer => {
                    if (layer.feature && layer.feature.properties) {
                        const props = layer.feature.properties;
                        if (props.id == anomalie.id_conduite2 || props.fid == anomalie.id_conduite2) {
                            if (layer.getBounds) {
                                coords = layer.getBounds().getCenter();
                            }
                        }
                    }
                });
                return coords ? [coords.lat, coords.lng] : null;
            }

            // Pour conduites_sans_regards: centroïde de la conduite
            if (anomalie.id_conduite && layers.conduites) {
                let coords = null;
                layers.conduites.eachLayer(layer => {
                    if (layer.feature && layer.feature.properties) {
                        const props = layer.feature.properties;
                        if (props.id == anomalie.id_conduite || props.fid == anomalie.id_conduite) {
                            if (layer.getBounds) {
                                coords = layer.getBounds().getCenter();
                            }
                        }
                    }
                });
                return coords ? [coords.lat, coords.lng] : null;
            }

            return null;
        }

        function zoomOnAnomalies() {
            if (anomalyMarkers.length > 0) {
                const group = new L.featureGroup(anomalyMarkers);
                map.fitBounds(group.getBounds(), { padding: [20, 20] });
                showNotification(`Zoom sur ${anomalyMarkers.length} anomalies`, 'success');
            } else {
                showNotification('Aucune anomalie visible', 'warning');
            }
        }

        function showNotification(message, type = 'info') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.style.background = type === 'success' ? '#4caf50' : type === 'error' ? '#f44336' : '#2196f3';
            notif.style.display = 'block';
            setTimeout(() => notif.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
